name: Python CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-clawdbot:
    name: clawdbot (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/clawdbot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import runner; print('runner imports OK')"

  lint-clawdhub:
    name: clawdhub (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/clawdhub
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import hub; print('hub imports OK')"
