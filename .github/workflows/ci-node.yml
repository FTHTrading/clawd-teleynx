name: Node.js CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build-x402-gateway:
    name: x402-credit-gateway (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/x402-credit-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/x402-credit-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

  build-inference-router:
    name: inference-router (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/inference-router
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/inference-router/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  build-speech-router:
    name: speech-router (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/speech-router
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/speech-router/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
