name: Docker Compose Validation

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    name: docker compose config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.nvidia.yml syntax
        run: docker compose -f docker-compose.nvidia.yml config --quiet

      - name: Validate docker/compose.nvidia-stack.yml syntax
        run: docker compose -f docker/compose.nvidia-stack.yml config --quiet
