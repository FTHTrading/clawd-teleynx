# NVIDIA-First AI Stack — docker-compose.nvidia.yml
# RTX 5090 24GB — Triton + Riva + ClawdBot v2 + Routers
#
# Start: docker compose -f docker-compose.nvidia.yml up -d
# Ports: Triton HTTP 8000 / gRPC 8001 / Metrics 8002
#        Riva Speech 50051 / HTTP 9010
#        Inference Router 8100
#        Speech Router 8200
#        ClawdBot 8089

services:
  # ═══════════════════════════════════════════════
  # Layer 1: NVIDIA Triton Inference Server
  # Handles: embeddings (BGE-small ONNX + TRT)
  # ═══════════════════════════════════════════════
  triton:
    image: nvcr.io/nvidia/tritonserver:25.04-py3
    container_name: nvidia-triton
    command: ["tritonserver", "--model-repository=/models", "--log-verbose=0"]
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ./docker/triton/models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Layer 2: NVIDIA Riva Speech (ASR + TTS)
  # All-in-one speech container
  # ═══════════════════════════════════════════════
  riva:
    image: nvcr.io/nvidia/riva/riva-speech:2.18.0
    container_name: nvidia-riva
    ports:
      - "50051:50051"  # gRPC
      - "9010:8000"    # HTTP (renamed to avoid Triton conflict)
    volumes:
      - riva-models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Layer 3: Inference Router (Triton + NIM + Ollama)
  # ═══════════════════════════════════════════════
  inference-router:
    build:
      context: ./packages/inference-router
      dockerfile: Dockerfile
    container_name: inference-router
    ports:
      - "8100:8100"
    environment:
      - PORT=8100
      - TRITON_URL=http://triton:8001
      - NIM_URL=http://triton:8000
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      triton:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Layer 4: Speech Router (Riva + Whisper/Piper)
  # ═══════════════════════════════════════════════
  speech-router:
    build:
      context: ./packages/speech-router
      dockerfile: Dockerfile
    container_name: speech-router
    ports:
      - "8200:8200"
    environment:
      - PORT=8200
      - RIVA_ASR_URL=http://riva:8000
      - RIVA_TTS_URL=http://riva:8000
      - WHISPER_URL=http://host.docker.internal:7700
      - PIPER_URL=http://host.docker.internal:7700
    depends_on:
      riva:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8200/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Layer 5: ClawdBot v2 — NVIDIA-first executor
  # ═══════════════════════════════════════════════
  clawdbot:
    build:
      context: ./packages/clawdbot
      dockerfile: Dockerfile
    container_name: clawdbot-v2
    ports:
      - "8089:8089"
    environment:
      - PORT=8089
      - INFERENCE_ROUTER_URL=http://inference-router:8100
      - SPEECH_ROUTER_URL=http://speech-router:8200
      - OLLAMA_URL=http://host.docker.internal:11434
      - CLAWDHUB_URL=http://host.docker.internal:8099
    depends_on:
      inference-router:
        condition: service_healthy
      speech-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  riva-models:
    name: nvidia-riva-models
