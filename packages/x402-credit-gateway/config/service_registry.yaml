version: 1
services:
  - name: jefe-kernel
    command: node dist/index.js
    workdir: C:/Users/Kevan/UnyKorn-X402-aws/packages/x402-credit-gateway
    env_file: ops/windows/env/jefe-kernel.env
    startup: automatic
    restart_policy: on-failure
    restart_backoff_seconds: [5, 15, 30, 60]
    health_probe: http://127.0.0.1:4020/health
    criticality: critical
    depends_on: [ollama-local]
  - name: ollama-local
    command: ollama serve
    workdir: C:/Users/Kevan
    env_file: ops/windows/env/ollama.env
    startup: automatic
    restart_policy: on-failure
    health_probe: http://127.0.0.1:11434/api/tags
    criticality: critical
  - name: apostle-chain
    command: apostle-chain.exe
    workdir: C:/Users/Kevan/apostle-chain
    env_file: ops/windows/env/apostle.env
    startup: automatic
    restart_policy: on-failure
    health_probe: http://127.0.0.1:7332/health
    criticality: high
  - name: clawdbot-runner
    command: python runner.py
    workdir: C:/Users/Kevan/UnyKorn-X402-aws/packages/clawdbot
    env_file: ops/windows/env/clawdbot.env
    startup: automatic
    restart_policy: on-failure
    health_probe: http://127.0.0.1:8089/health
    criticality: high
